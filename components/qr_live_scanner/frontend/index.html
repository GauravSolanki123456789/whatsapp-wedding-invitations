<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 8px 6px 10px;
      background: #FFFBF7;
      color: #2C2416;
    }
    #reader {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      min-height: 260px;
      background: #111;
    }
    #reader video {
      object-fit: cover !important;
    }
    #status {
      font-size: 0.86rem;
      color: #6B5B52;
      margin: 8px 0;
      text-align: center;
      min-height: 1.4em;
      line-height: 1.35;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 12px;
      margin: 5px 0;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b76e79, #9e5560);
      color: #fff;
    }
    .btn-secondary {
      background: #fff;
      color: #5c3d42;
      border: 1px solid rgba(183, 110, 121, 0.35);
    }
  </style>
</head>
<body>
  <div id="reader"></div>
  <p id="status">Tap <strong>Start scanner</strong> — rear camera for QR</p>
  <button type="button" class="btn btn-primary" id="btnStart">Start scanner</button>
  <button type="button" class="btn btn-secondary" id="btnStop" style="display:none;">Stop scanner</button>

  <script>
    /* Inline Streamlit custom-component bridge (API v1) — avoids CDN / undefined apiVersion */
    (function () {
      var API_VERSION = 1;
      window.Streamlit = {
        API_VERSION: API_VERSION,
        RENDER_EVENT: "streamlit:render",
        events: {
          _handlers: {},
          addEventListener: function (type, handler) {
            if (!this._handlers[type]) this._handlers[type] = [];
            this._handlers[type].push(handler);
          },
          dispatch: function (event) {
            var list = this._handlers[event.type] || [];
            for (var i = 0; i < list.length; i++) list[i](event);
          },
        },
        setComponentReady: function () {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:componentReady",
              apiVersion: API_VERSION,
            },
            "*"
          );
        },
        setComponentValue: function (value) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setComponentValue",
              apiVersion: API_VERSION,
              value: value,
            },
            "*"
          );
        },
        setFrameHeight: function (height) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setFrameHeight",
              apiVersion: API_VERSION,
              height: height,
            },
            "*"
          );
        },
      };

      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || !data.type) return;
        if (data.type === "streamlit:render") {
          Streamlit.events.dispatch({ type: Streamlit.RENDER_EVENT, detail: data });
        }
      });
    })();

    let html5QrCode = null;
    let running = false;
    let sentToken = null;
    const statusEl = document.getElementById("status");

    const BACK_LABELS = [/back/i, /rear/i, /environment/i, /rück/i, /arrière/i, /trás/i, /wide/i];
    const FRONT_LABELS = [/front/i, /user/i, /selfie/i, /face/i, /facetime/i];

    function isFrontLabel(label) {
      return FRONT_LABELS.some(function (p) { return p.test(label || ""); });
    }

    function isBackLabel(label) {
      return BACK_LABELS.some(function (p) { return p.test(label || ""); });
    }

    function pickBackCameraId(devices) {
      if (!devices || !devices.length) return null;

      for (var i = 0; i < devices.length; i++) {
        if (isBackLabel(devices[i].label)) return devices[i].id;
      }

      var nonFront = devices.filter(function (d) {
        return d.label && !isFrontLabel(d.label);
      });
      if (nonFront.length) return nonFront[nonFront.length - 1].id;

      if (devices.length >= 2) return devices[devices.length - 1].id;

      return null;
    }

    function setStatus(text) {
      statusEl.textContent = text;
      resizeFrame();
    }

    function resizeFrame() {
      var height = Math.max(document.body.scrollHeight, 420);
      Streamlit.setFrameHeight(height);
    }

    function sendToken(token) {
      Streamlit.setComponentValue(token);
      resizeFrame();
    }

    async function warmUpRearCameraPermission() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("Camera not supported in this browser.");
      }
      var stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      });
      stream.getTracks().forEach(function (track) { track.stop(); });
    }

    async function resolveRearCamera() {
      await warmUpRearCameraPermission();
      var devices = await Html5Qrcode.getCameras();
      var backId = pickBackCameraId(devices);
      if (backId) return backId;
      return { facingMode: { ideal: "environment" } };
    }

    function onScanSuccess(decodedText) {
      var token = (decodedText || "").trim();
      if (!token || token === sentToken) return;
      sentToken = token;
      setStatus("QR found — opening guest…");
      sendToken(token);
      stopScanner(false);
    }

    async function tryStart(camera) {
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
        try { await html5QrCode.clear(); } catch (e) {}
      }
      html5QrCode = new Html5Qrcode("reader", { verbose: false });
      var boxSize = Math.min(300, Math.max(200, window.innerWidth - 40));
      var config = {
        fps: 15,
        qrbox: { width: boxSize, height: boxSize },
        aspectRatio: 1.0,
        disableFlip: false,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      };
      await html5QrCode.start(camera, config, onScanSuccess, function () {});
    }

    async function startScanner() {
      if (running) return;
      sentToken = null;
      setStatus("Opening rear camera…");

      try {
        var rearCamera = await resolveRearCamera();
        await tryStart(rearCamera);
      } catch (err1) {
        try {
          await tryStart({ facingMode: { ideal: "environment" } });
        } catch (err2) {
          setStatus("Rear camera blocked. Allow camera access, then retry — or use photo backup.");
          console.error(err2);
          return;
        }
      }

      running = true;
      setStatus("Rear camera on — hold QR in the box");
      document.getElementById("btnStart").style.display = "none";
      document.getElementById("btnStop").style.display = "block";
      resizeFrame();
    }

    async function stopScanner(showStopped) {
      if (showStopped === undefined) showStopped = true;
      if (html5QrCode && running) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
        } catch (e) {}
        running = false;
        if (showStopped) setStatus("Scanner stopped");
        document.getElementById("btnStart").style.display = "block";
        document.getElementById("btnStop").style.display = "none";
        resizeFrame();
      }
    }

    document.getElementById("btnStart").addEventListener("click", startScanner);
    document.getElementById("btnStop").addEventListener("click", function () {
      stopScanner(true);
    });

    Streamlit.setComponentReady();
    resizeFrame();
    window.addEventListener("resize", resizeFrame);
  </script>
</body>
</html>
